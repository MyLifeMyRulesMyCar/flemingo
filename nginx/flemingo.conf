# nginx/flemingo.conf
# PurpleIO / Flemingo-EdgeForce-1000 — nginx reverse proxy config.
#
# What this does:
#   Port 80  → 301 redirect to HTTPS (no plaintext ever leaves the box)
#   Port 443 → TLS termination, then proxy to Flask on 127.0.0.1:5000
#              over plain HTTP (loopback only — never hits the wire).
#   WebSocket upgrade headers are forwarded so SocketIO wss:// works.
#   Long Modbus scan operations (up to ~60s) don't get killed mid-flight.
#
# Installation:
#   sudo bash scripts/install_nginx.sh
#   (generates self-signed cert, copies this file, enables the service)
#
# TLS certificate:
#   Default: self-signed cert at /etc/flemingo/certs/flemingo.{crt,key}
#   Generated by scripts/gen_selfsigned_cert.sh
#   To use Let's Encrypt instead, swap the ssl_certificate paths below
#   to /etc/letsencrypt/live/<domain>/fullchain.pem and privkey.pem —
#   nothing else in this file needs to change.
#
# After any edit:
#   sudo nginx -t && sudo systemctl reload nginx

# ─── HTTP: redirect everything to HTTPS ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;          # match any hostname / bare IP

    # 301 so browsers remember the redirect and skip the round-trip
    return 301 https://$host$request_uri;
}

# ─── HTTPS: TLS termination + proxy to Flask ────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # ── TLS certificate ──────────────────────────────────────────────
    ssl_certificate     /etc/flemingo/certs/flemingo.crt;
    ssl_certificate_key /etc/flemingo/certs/flemingo.key;

    # ── TLS hardening ────────────────────────────────────────────────
    # TLS 1.2 minimum — TLS 1.0/1.1 are deprecated (RFC 8996).
    # TLS 1.3 is preferred where both sides support it (Purple Pi Ubuntu 22+).
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Modern cipher suite from Mozilla SSL Config Generator (intermediate).
    # ECDHE for forward secrecy; AES-GCM and CHACHA for performance on ARM.
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;   # let TLS 1.3 pick its own ciphers

    # Session resumption — reduces handshake overhead on repeated connections.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;         # tickets have forward-secrecy tradeoffs

    # HSTS: once a browser has seen this header it won't try HTTP for 1 year.
    # Only enable after you're sure TLS is working — hard to undo.
    # add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Request limits ───────────────────────────────────────────────
    # CAN frames are 8 bytes; Modbus register writes are tiny.
    # 1 MB is generous headroom and prevents oversized bodies reaching Flask.
    client_max_body_size 1m;

    # ── Proxy to Flask ───────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;

        # Standard proxy headers so Flask can see the real client IP.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── WebSocket / SocketIO upgrade ─────────────────────────────
        # Flask-SocketIO negotiates a WebSocket upgrade on the same port
        # as the REST API. nginx must forward the Upgrade header and switch
        # to HTTP/1.1 (which supports Connection: upgrade).
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # ── Timeouts ─────────────────────────────────────────────────
        # proxy_read_timeout is the time nginx will wait for Flask to send
        # data. Default is 60s; Modbus scan across 247 slave IDs at 1s
        # per attempt could take longer — raise to 90s.
        proxy_read_timeout 90s;

        # proxy_connect_timeout: time to establish connection to Flask.
        # Flask is on loopback, so 5s is more than enough.
        proxy_connect_timeout 5s;
    }
}