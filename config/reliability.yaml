# config/reliability.yaml
# Tuning knobs for core/resilience.py and core/watchdog.py.
# Edit this on a deployed unit to change behavior without touching code.

circuit_breaker:
  can:
    # How many consecutive connect/RX failures before CAN's breaker
    # opens and stops attempting hardware access for `timeout` seconds.
    failure_threshold: 5
    timeout: 60

  modbus:
    # Same idea, but applied PER DEVICE - one dead slave opening its
    # breaker doesn't affect any other configured device.
    failure_threshold: 5
    timeout: 60

retry:
  # Used for one-shot operations (opening a serial port, initial SPI
  # bring-up) - NOT for the per-request CAN/Modbus calls, which are
  # already covered by the circuit breakers above.
  max_retries: 3
  initial_delay: 1
  max_delay: 30

watchdog:
  # If the daemon's main loop doesn't call watchdog.feed() within this
  # many seconds, the watchdog assumes the loop is hung.
  timeout: 30
  # How often (seconds) the watchdog re-runs the registered component
  # health checks (GPIO/CAN/Modbus), independent of the feed timeout.
  check_interval: 10
  # When true, the watchdog calls os._exit(1) on timeout so systemd's
  # Restart=on-failure restarts the whole process. Set to false if you
  # want to keep the process alive for debugging a hung loop.
  exit_on_timeout: true

logging:
  level: INFO
  file: logs/flemingo.log
  max_bytes: 5242880   # 5 MB
  backup_count: 5

auth:
  # Duration of short-lived access tokens (minutes).
  # Shorter = more secure, more refreshes. 30 min suits a LAN operator
  # with a dashboard open. Increase if token-refresh churn is annoying
  # on slow embedded clients.
  access_token_minutes: 30

  # Duration of refresh tokens (days). These are used ONLY to mint new
  # access tokens; they're not sent on every request. 7 days means a
  # field tech logging in on Monday can work through the week without
  # re-entering a password.
  refresh_token_days: 7

  # Minimum password length enforced at create_user / change_password.
  min_password_length: 10

security:
  # CORS allowed origins — controls which browser origins can make
  # credentialed cross-origin requests to the API.
  #
  # Bench / development (default):
  #   cors_origins: ["*"]   ← any origin allowed, fine when device is
  #                           not reachable from the internet.
  #
  # Customer site / production:
  #   Replace "*" with the exact origin of your dashboard or integrator.
  #   e.g.  cors_origins: ["http://192.168.1.50:3000"]
  #         cors_origins: ["https://flemingo.local", "http://192.168.1.50"]
  #
  # Field override without editing this file:
  #   PURPLEIO_CORS_ORIGINS="http://192.168.1.50:3000" python3 api/app.py
  cors_origins:
    - "*"
  # Login rate limiting — max failed attempts per (IP, username) pair
  # in a sliding time window. Exceed this and get 429 until the window
  # expires. Success clears the counter.
  login_max_attempts: 5
  login_window_minutes: 15